version: '3'

tasks:
  default:
    desc: Show available tasks and options
    cmds:
      - task --list

  dev:
    desc: Run the Vite dev server
    cmds:
      - npm run dev

  preview:
    desc: Preview the production build locally
    cmds:
      - npm run build
      - npm run preview

  import-medium:
    desc: Import Medium posts into /public/posts (RSS feed)
    cmds:
      - node scripts/import-medium.js

  import-outshift:
    desc: Import Outshift posts into /public/posts (Playwright)
    cmds:
      - node scripts/import-outshift.js
