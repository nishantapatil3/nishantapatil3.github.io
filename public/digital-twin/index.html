<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chat with My Digital Twin</title>
    <script>
      (() => {
        const stored = localStorage.getItem('theme');
        const preferred = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
          ? 'dark'
          : 'light';
        const theme = stored || preferred;
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    <link rel="stylesheet" href="/posts/site.css" />
    <style>
      body { min-height: 100vh; }
      .chat-container {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 16px;
      }
      .chat-frame {
        width: 100%;
        height: min(70vh, 760px);
        border: none;
        border-radius: 12px;
        background: var(--surface);
      }
    </style>
  </head>
  <body class="post-page">
    <header class="site-header">
      <div class="container">
        <div class="header-row">
          <a class="nav-link" href="/index.html">← Back to home</a>
          <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle theme"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></button>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="posts-hero">
        <h1>Chat with My Digital Twin</h1>
        <p>Ask about my work, projects, and interests.</p>
      </section>

      <section class="chat-container">
        <iframe
          class="chat-frame"
          src="https://nishantapatil3-nishant-chatbot.hf.space"
          title="Nishant Patil Digital Twin"
          loading="lazy"
        ></iframe>
      </section>
    </main>
      <script src="/posts/theme.js"></script>
  </body>
</html>
